<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MoolSocial Provider Workspace Review</title><style>:root{--navy:#000080;--green:#138808;--saffron:#ff9933;--ink:#111438;--muted:#68708a;--line:#d8dced;--bg:#f3f5fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif;letter-spacing:0}.top{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;border-bottom:1px solid var(--line);padding:13px 18px;background:rgba(255,255,255,.98)}.brand{display:grid;gap:3px}.brand b{color:var(--navy);font-size:21px}.brand span{color:var(--muted);font-size:11px}.tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.tools select,.badge{min-height:36px;border:1px solid var(--line);border-radius:6px;background:#fff;padding:7px 9px;color:var(--ink);font-size:10px;font-weight:900}.badge.green{border-color:#b9ddb7;color:var(--green)}.layout{display:grid;grid-template-columns:minmax(315px,390px) minmax(420px,1fr);min-height:calc(100vh - 72px)}.catalog{overflow:auto;border-right:1px solid var(--line);padding:12px}.catalog h2{margin:5px 0 9px;color:var(--navy);font-size:12px}.item{width:100%;display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:9px;align-items:center;border:1px solid var(--line);border-radius:7px;margin-bottom:7px;padding:8px;background:#fff;text-align:left;cursor:pointer}.item:hover,.item.active{border-color:var(--navy);box-shadow:inset 3px 0 0 var(--saffron)}.num{width:34px;height:34px;display:grid;place-items:center;border-radius:6px;background:#eef0ff;color:var(--navy);font-size:12px;font-weight:900}.copy{min-width:0;display:grid;gap:2px}.copy b,.copy span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.copy b{font-size:12px}.copy span{color:var(--muted);font-size:10px}.state{border-radius:999px;padding:4px 6px;background:#fff1e1;color:#8b4c00;font-size:8px;font-weight:900}.preview{position:sticky;top:72px;height:calc(100vh - 72px);display:grid;grid-template-rows:auto minmax(0,1fr);padding:12px}.preview-bar{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-bottom:0;border-radius:8px 8px 0 0;padding:8px 10px;background:#fff}.preview-copy{min-width:0;display:grid;gap:2px}.preview-copy b{color:var(--navy);font-size:13px}.preview-copy span{color:var(--muted);font-size:10px}.actions{display:flex;gap:6px}.open{border-radius:6px;padding:8px 10px;background:var(--navy);color:#fff;font-size:10px;font-weight:900;text-decoration:none;white-space:nowrap}.frame-wrap{min-height:0;display:grid;place-items:center;overflow:auto;border:1px solid var(--line);border-radius:0 0 8px 8px;background:#e8ebf3}.frame{width:410px;height:calc(100vh - 120px);border:0;background:#fff;box-shadow:0 10px 30px rgba(0,0,80,.16)}@media(max-width:850px){.top{position:static;grid-template-columns:1fr;padding:12px}.layout{display:block}.catalog{border:0;padding:10px}.preview{display:none}.item{min-height:60px}}</style></head><body><header class="top"><span class="brand"><b>MoolSocial Provider Workspaces</b><span>Exact profile, configurable operations - restaurant, doctor, salon, pharmacy, transport and individual services</span></span><span class="tools"><select id="profile"><option value="individual_service">Individual Service</option><option value="restaurant">Restaurant</option><option value="cloud_kitchen">Cloud Kitchen</option><option value="tiffin_provider">Tiffin Provider</option><option value="salon">Salon</option><option value="home_beauty">Home Beauty</option><option value="individual_doctor">Doctor</option><option value="clinic">Clinic</option><option value="hospital">Hospital</option><option value="pharmacy">Pharmacy</option><option value="local_transporter">Transporter</option><option value="fleet_operator">Fleet Operator</option></select><span class="badge green">8 routes - 10+ exact profiles</span></span></header><main class="layout"><section class="catalog"><h2>Compact operating journey</h2><div id="catalog"></div></section><section class="preview"><div class="preview-bar"><span class="preview-copy"><b id="title">Screen 139 - Provider Home</b><span id="purpose">Readiness, priorities and one-tap operations</span></span><span class="actions"><a class="open" target="_blank" id="open" href="screens/139-provider-home-readiness.html?profile=individual_service">Open Web</a></span></div><div class="frame-wrap"><iframe class="frame" id="frame" title="Provider mobile preview" src="screens/139-provider-home-readiness.html?profile=individual_service"></iframe></div></section></main><script>const screens=[[139,'Provider Home','Readiness, priorities and one-tap operations','screens/139-provider-home-readiness.html'],[140,'Catalogue','Menu, services or medicines with exact profile fields','screens/140-provider-catalogue.html'],[141,'Availability','Slots, kitchen capacity, service area or routes','screens/141-provider-availability.html'],[142,'Requests','Orders, bookings, appointments or jobs','screens/142-provider-requests.html'],[143,'Fulfilment','Progressive execution and customer communication','screens/143-provider-fulfilment.html'],[144,'Business','Customers, payments, receipts and protected records','screens/144-provider-business.html'],[145,'Earn and Grow','Funded work and operated campaigns','screens/145-provider-growth.html'],[146,'Controls','Readiness, staff, settings and support','screens/146-provider-control.html']];const catalog=document.getElementById('catalog'),frame=document.getElementById('frame'),title=document.getElementById('title'),purpose=document.getElementById('purpose'),open=document.getElementById('open'),profile=document.getElementById('profile');let active=screens[0];const url=x=>x+'?profile='+encodeURIComponent(profile.value);function show(screen,button){active=screen;document.querySelectorAll('.item.active').forEach(x=>x.classList.remove('active'));if(button)button.classList.add('active');frame.src=url(screen[3]);title.textContent=`Screen ${screen[0]} - ${screen[1]}`;purpose.textContent=screen[2];open.href=url(screen[3])}screens.forEach((screen,index)=>{const b=document.createElement('button');b.className=`item${index===0?' active':''}`;b.innerHTML=`<span class="num">${screen[0]}</span><span class="copy"><b>${screen[1]}</b><span>${screen[2]}</span></span><span class="state">Review</span>`;b.onclick=()=>{if(matchMedia('(max-width:850px)').matches){location.href=url(screen[3]);return}show(screen,b)};catalog.appendChild(b)});profile.onchange=()=>show(active,document.querySelector('.item.active'));</script></body></html>
