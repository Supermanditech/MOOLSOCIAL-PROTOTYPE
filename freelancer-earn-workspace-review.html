<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MoolSocial Freelancer / Earn Review</title><style>:root{--navy:#000080;--green:#138808;--saffron:#ff9933;--ink:#111438;--muted:#68708a;--line:#d8dced;--bg:#f3f5fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif}.top{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;border-bottom:1px solid var(--line);padding:14px 18px;background:rgba(255,255,255,.98)}.brand{display:grid;gap:3px}.brand b{color:var(--navy);font-size:21px}.brand span{color:var(--muted);font-size:11px}.summary{display:flex;gap:7px;flex-wrap:wrap}.badge{border:1px solid var(--line);border-radius:6px;padding:7px 9px;background:#fff;font-size:10px;font-weight:900}.badge.green{border-color:#b9ddb7;color:var(--green)}.layout{display:grid;grid-template-columns:minmax(315px,390px) minmax(420px,1fr);min-height:calc(100vh - 72px)}.catalog{overflow:auto;border-right:1px solid var(--line);padding:12px}.catalog h2{margin:5px 0 9px;color:var(--navy);font-size:12px}.item{width:100%;display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:9px;align-items:center;border:1px solid var(--line);border-radius:7px;margin-bottom:7px;padding:8px;background:#fff;text-align:left;cursor:pointer}.item:hover,.item.active{border-color:var(--navy);box-shadow:inset 3px 0 0 var(--saffron)}.num{width:34px;height:34px;display:grid;place-items:center;border-radius:6px;background:#eef0ff;color:var(--navy);font-size:12px;font-weight:900}.copy{min-width:0;display:grid;gap:2px}.copy b,.copy span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.copy b{font-size:12px}.copy span{color:var(--muted);font-size:10px}.state{border-radius:999px;padding:4px 6px;background:#fff1e1;color:#8b4c00;font-size:8px;font-weight:900}.preview{position:sticky;top:72px;height:calc(100vh - 72px);display:grid;grid-template-rows:auto minmax(0,1fr);padding:12px}.preview-bar{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-bottom:0;border-radius:8px 8px 0 0;padding:8px 10px;background:#fff}.preview-copy{min-width:0;display:grid;gap:2px}.preview-copy b{color:var(--navy);font-size:13px}.preview-copy span{color:var(--muted);font-size:10px}.actions{display:flex;gap:6px}.open{border-radius:6px;padding:8px 10px;background:var(--navy);color:#fff;font-size:10px;font-weight:900;text-decoration:none;white-space:nowrap}.open.secondary{border:1px solid var(--navy);background:#fff;color:var(--navy)}.frame-wrap{min-height:0;display:grid;place-items:center;overflow:auto;border:1px solid var(--line);border-radius:0 0 8px 8px;background:#e8ebf3}.frame{width:410px;height:calc(100vh - 120px);border:0;background:#fff;box-shadow:0 10px 30px rgba(0,0,80,.16)}@media(max-width:850px){.top{position:static;grid-template-columns:1fr;padding:12px}.layout{display:block}.catalog{border:0;padding:10px}.preview{display:none}.item{min-height:60px}}</style></head><body><header class="top"><span class="brand"><b>MoolSocial Freelancer / Earn</b><span>Funded work, bounded output, proof and payout · mobile execution with responsive web access</span></span><span class="summary"><span class="badge">Screens 133–138</span><span class="badge green">6 routes · 6 capabilities</span><span class="badge">Ready for review</span></span></header><main class="layout"><section class="catalog"><h2>Complete paid-work journey</h2><div id="catalog"></div></section><section class="preview"><div class="preview-bar"><span class="preview-copy"><b id="title">Screen 133 · Opportunities</b><span id="purpose">Matched funded work and realistic capacity</span></span><span class="actions"><a class="open secondary" target="_blank" id="web" href="screens/133-earn-opportunities.html">Open Web</a><a class="open" id="open" href="screens/133-earn-opportunities.html">Open Full Screen</a></span></div><div class="frame-wrap"><iframe class="frame" id="frame" title="Freelancer mobile preview" src="screens/133-earn-opportunities.html"></iframe></div></section></main><script>const screens=[[133,'Opportunities','Matched funded work and realistic capacity','screens/133-earn-opportunities.html'],[134,'Applications','Eligibility, saved and application states','screens/134-earn-applications-eligibility.html'],[135,'Active Work','One bounded output with steps and deadline','screens/135-earn-active-work.html'],[136,'Proof & Outcome','Evidence capture, verification and appeal','screens/136-earn-proof-outcome.html'],[137,'Earnings','Held, payable and paid task ledger','screens/137-earn-earnings-payout.html'],[138,'History & Support','Ratings, issues, appeals and growth','screens/138-earn-issues-ratings-history.html']];const catalog=document.getElementById('catalog'),frame=document.getElementById('frame'),title=document.getElementById('title'),purpose=document.getElementById('purpose'),open=document.getElementById('open'),web=document.getElementById('web');screens.forEach(([id,name,detail,url])=>{const b=document.createElement('button');b.className=`item${id===133?' active':''}`;b.innerHTML=`<span class="num">${id}</span><span class="copy"><b>${name}</b><span>${detail}</span></span><span class="state">Review</span>`;b.addEventListener('click',()=>{if(matchMedia('(max-width:850px)').matches){location.href=url;return}document.querySelectorAll('.item.active').forEach(x=>x.classList.remove('active'));b.classList.add('active');frame.src=url;title.textContent=`Screen ${id} · ${name}`;purpose.textContent=detail;open.href=url;web.href=url});catalog.appendChild(b)});</script></body></html>
