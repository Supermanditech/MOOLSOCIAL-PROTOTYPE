<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MoolSocial Admin + Shared Review</title><style>
:root{--navy:#000080;--ink:#101336;--muted:#6c7087;--line:#dfe2ef;--soft:#f2f4fa;--white:#fff;--green:#138808;--orange:#ff9933}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--ink);font:500 14px/1.35 Inter,Arial,sans-serif;letter-spacing:0}.shell{min-height:100dvh;display:grid;grid-template-columns:300px 1fr}.side{height:100dvh;overflow:auto;background:#fff;border-right:1px solid var(--line);padding:18px;position:sticky;top:0}.brand{color:var(--navy);font-size:22px;font-weight:900}.brand:after{content:"";display:block;width:92px;height:4px;margin-top:6px;background:linear-gradient(90deg,var(--orange) 0 33%,#fff 33% 66%,var(--green) 66%);border:1px solid #eee}.side h1{font-size:18px;margin:20px 0 4px}.side p{color:var(--muted);font-size:12px;margin:0 0 14px}.filters{display:flex;gap:6px;margin-bottom:12px}.filters button,.mode button{border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:6px;padding:7px 9px;font-weight:800;cursor:pointer}.filters button.active,.mode button.active{background:var(--navy);border-color:var(--navy);color:#fff}.nav{display:grid;gap:4px}.nav button{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;border:0;background:#fff;text-align:left;padding:9px 8px;border-radius:6px;color:inherit;cursor:pointer}.nav button:hover,.nav button.active{background:#eef0ff}.num{width:30px;height:30px;display:grid;place-items:center;border-radius:50%;background:#edf0f8;color:var(--navy);font-size:11px;font-weight:900}.nav button.active .num{background:var(--navy);color:#fff}.nav small{display:block;color:var(--muted);margin-top:2px}.status{font-size:8px;font-weight:900;color:#915000;background:#fff2dd;padding:3px 5px;border-radius:4px}.main{min-width:0;padding:18px}.toolbar{display:flex;align-items:center;gap:12px;justify-content:space-between;margin-bottom:14px}.current h2{margin:0;font-size:20px}.current p{margin:3px 0 0;color:var(--muted);font-size:12px}.mode{display:flex;gap:6px}.stage{min-height:calc(100dvh - 92px);display:grid;place-items:start center;overflow:auto;padding:18px;background:#dfe3ee;border:1px solid #d3d7e4;border-radius:8px}.device{width:420px;max-width:100%;height:820px;border:10px solid #0a0b36;border-radius:30px;overflow:hidden;background:#fff;box-shadow:0 20px 55px rgba(10,12,50,.22);transition:.2s}.device.desktop{width:1180px;height:760px;border-width:5px;border-radius:10px}.device iframe{width:100%;height:100%;border:0;background:#fff}.summary{margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.sum{background:#fff;border-bottom:3px solid var(--line);padding:10px}.sum strong{display:block;color:var(--navy);font-size:18px}.sum span{font-size:10px;color:var(--muted);font-weight:900;text-transform:uppercase}@media(max-width:780px){.shell{display:block}.side{position:relative;width:100%;height:auto;max-height:44dvh;border-right:0;border-bottom:1px solid var(--line)}.main{padding:10px}.toolbar{align-items:flex-end}.stage{padding:5px;min-height:auto}.device{height:76dvh;border-width:5px;border-radius:18px}.summary{grid-template-columns:1fr 1fr}.mode .desktopBtn{display:none}}
</style></head><body><div class="shell"><aside class="side"><div class="brand">MoolSocial</div><h1>Admin + Shared Review</h1><p>Eighteen progressive MVP states. Draft until approved together.</p><div class="filters"><button class="active" data-filter="All">All</button><button data-filter="Admin">Admin</button><button data-filter="Shared">Shared</button></div><nav class="nav"></nav><div class="summary"><div class="sum"><strong>12</strong><span>Admin views</span></div><div class="sum"><strong>6</strong><span>Shared</span></div><div class="sum"><strong>113</strong><span>Routes used</span></div><div class="sum"><strong>7</strong><span>Remaining</span></div></div></aside><main class="main"><header class="toolbar"><div class="current"><h2></h2><p></p></div><div class="mode"><button class="active" data-mode="mobile">Mobile</button><button class="desktopBtn" data-mode="desktop">Desktop</button><button id="open">Open</button></div></header><section class="stage"><div class="device"><iframe title="Prototype preview"></iframe></div></section></main></div><script>
const screens=[
{n:147,g:'Admin',t:'Operations Command Centre',f:'147-admin-command-centre.html'},
{n:148,g:'Admin',t:'Workspace Verification',f:'148-admin-workspace-verification.html'},
{n:149,g:'Admin',t:'Catalogue & SKU Governance',f:'149-admin-catalogue-governance.html'},
{n:150,g:'Admin',t:'Commerce Exceptions',f:'150-admin-commerce-exceptions.html'},
{n:151,g:'Admin',t:'Ride Operations',f:'151-admin-ride-operations.html'},
{n:152,g:'Admin',t:'Work & Campaign Governance',f:'152-admin-work-campaign-governance.html'},
{n:153,g:'Admin',t:'Content Trust & Safety',f:'153-admin-content-trust-safety.html'},
{n:154,g:'Admin',t:'Finance Reconciliation',f:'154-admin-finance-reconciliation.html'},
{n:155,g:'Admin',t:'Support SLA & Disputes',f:'155-admin-support-disputes.html'},
{n:156,g:'Admin',t:'Audience Launch & Configuration',f:'156-admin-audience-launch-configuration.html'},
{n:157,g:'Shared',t:'Priority Inbox',f:'157-shared-priority-inbox.html'},
{n:158,g:'Shared',t:'Identity, Documents & Consent',f:'158-shared-identity-documents-consent.html'},
{n:159,g:'Shared',t:'Search, Ask, Scan & Voice',f:'159-shared-universal-input.html'},
{n:160,g:'Shared',t:'Files, Evidence & Media',f:'160-shared-files-evidence-media.html'},
{n:161,g:'Shared',t:'Security, Audit & Support',f:'161-shared-security-support.html'},
{n:162,g:'Shared',t:'Workspaces, Settings & Analytics',f:'162-shared-workspaces-settings-analytics.html'},
{n:163,g:'Admin',t:'User Activity & Product Health',f:'163-admin-user-activity-product-health.html'},
{n:164,g:'Admin',t:'Signals, Consent & Personalization',f:'164-admin-signals-consent-personalization.html'}];
let selected=screens[0],filter='All';const nav=document.querySelector('.nav'),frame=document.querySelector('iframe'),device=document.querySelector('.device');function draw(){nav.innerHTML=screens.filter(s=>filter==='All'||s.g===filter).map(s=>`<button class="${s.n===selected.n?'active':''}" data-n="${s.n}"><span class="num">${s.n}</span><span><b>${s.t}</b><small>${s.g}</small></span><i class="status">DRAFT</i></button>`).join('');nav.querySelectorAll('button').forEach(b=>b.onclick=()=>{selected=screens.find(s=>s.n==b.dataset.n);draw();load()})}function load(){document.querySelector('.current h2').textContent=`Screen ${selected.n}: ${selected.t}`;document.querySelector('.current p').textContent=`${selected.g} · progressive production route`;frame.src=`screens/${selected.f}?v=admin-shared-review-1`;document.querySelector('#open').onclick=()=>window.open(frame.src,'_blank')}document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;document.querySelectorAll('[data-filter]').forEach(x=>x.classList.toggle('active',x===b));if(filter!=='All'&&selected.g!==filter)selected=screens.find(s=>s.g===filter);draw();load()});document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('active',x===b));device.classList.toggle('desktop',b.dataset.mode==='desktop')});draw();load();
</script></body></html>
