<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MoolSocial Review - Screen 01 + Screen 02</title>
  <style>
    :root {
      --navy: #000080;
      --saffron: #ff9933;
      --green: #138808;
      --white: #ffffff;
      --soft: #f6f8fb;
      --border: rgba(0, 0, 128, .22);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--soft);
      color: var(--navy);
      font-family: var(--font);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--white);
    }

    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .mark {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--navy);
      border-radius: 999px;
      padding: 0 12px;
      background: var(--navy);
      color: var(--white);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .review-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 14px;
    }

    .pane {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(680px, calc(100vh - 118px));
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--white);
    }

    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--white);
    }

    .pane-title {
      min-width: 0;
      margin: 0;
      font-size: 14px;
      font-weight: 950;
      line-height: 1.2;
    }

    a {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--white);
    }

    @media (max-width: 980px) {
      .review-grid {
        grid-template-columns: 1fr;
      }

      .pane {
        grid-template-rows: auto 760px;
      }

      header {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>MoolSocial Review - Screen 01 + Screen 02</h1>
    <span class="mark">Review only</span>
  </header>
  <main class="review-grid">
    <section class="pane">
      <div class="pane-head">
        <h2 class="pane-title">Screen 01: App Splash / First Open Handoff</h2>
        <a href="../screens/01-app-splash-first-open.html" target="_blank">Open full</a>
      </div>
      <iframe title="Screen 01" src="../screens/01-app-splash-first-open.html"></iframe>
    </section>
    <section class="pane">
      <div class="pane-head">
        <h2 class="pane-title">Screen 02: First Setup / Language + Location</h2>
        <a href="../screens/02-first-setup-language-location.html" target="_blank">Open full</a>
      </div>
      <iframe title="Screen 02" src="../screens/02-first-setup-language-location.html"></iframe>
    </section>
  </main>
</body>
</html>
