<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MoolSocial Captain Workspace Review</title><style>:root{--navy:#000080;--green:#138808;--saffron:#ff9933;--ink:#111438;--muted:#68708a;--line:#d8dced;--bg:#f3f5fa;--white:#fff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif;letter-spacing:0}button,a{font:inherit}.top{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;border-bottom:1px solid var(--line);padding:14px 18px;background:rgba(255,255,255,.98)}.brand{display:grid;gap:3px}.brand b{color:var(--navy);font-size:21px}.brand span{color:var(--muted);font-size:11px}.summary{display:flex;gap:7px;flex-wrap:wrap}.badge{border:1px solid var(--line);border-radius:6px;padding:7px 9px;background:var(--white);font-size:10px;font-weight:900}.badge.green{border-color:#b9ddb7;color:var(--green)}.layout{display:grid;grid-template-columns:minmax(315px,390px) minmax(420px,1fr);min-height:calc(100vh - 72px)}.catalog{overflow:auto;border-right:1px solid var(--line);padding:12px}.catalog h2{margin:5px 0 9px;color:var(--navy);font-size:12px}.item{width:100%;display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:9px;align-items:center;border:1px solid var(--line);border-radius:7px;margin-bottom:7px;padding:8px;background:var(--white);text-align:left;cursor:pointer}.item:hover,.item.active{border-color:var(--navy);box-shadow:inset 3px 0 0 var(--saffron)}.num{width:34px;height:34px;display:grid;place-items:center;border-radius:6px;background:#eef0ff;color:var(--navy);font-size:12px;font-weight:900}.copy{min-width:0;display:grid;gap:2px}.copy b,.copy span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.copy b{font-size:12px}.copy span{color:var(--muted);font-size:10px}.state{border-radius:999px;padding:4px 6px;background:#fff1e1;color:#8b4c00;font-size:8px;font-weight:900}.preview{position:sticky;top:72px;height:calc(100vh - 72px);display:grid;grid-template-rows:auto minmax(0,1fr);padding:12px}.preview-bar{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-bottom:0;border-radius:8px 8px 0 0;padding:8px 10px;background:var(--white)}.preview-copy{min-width:0;display:grid;gap:2px}.preview-copy b{color:var(--navy);font-size:13px}.preview-copy span{color:var(--muted);font-size:10px}.open{border:0;border-radius:6px;padding:8px 10px;background:var(--navy);color:#fff;font-size:10px;font-weight:900;text-decoration:none;white-space:nowrap}.frame-wrap{min-height:0;display:grid;place-items:center;overflow:auto;border:1px solid var(--line);border-radius:0 0 8px 8px;background:#e8ebf3}.frame{width:410px;height:calc(100vh - 120px);border:0;background:#fff;box-shadow:0 10px 30px rgba(0,0,80,.16)}@media(max-width:850px){.top{position:static;grid-template-columns:1fr;padding:12px}.layout{display:block}.catalog{border:0;padding:10px}.preview{display:none}.item{min-height:60px}.brand b{font-size:19px}}</style></head><body><header class="top"><span class="brand"><b>MoolSocial Captain Workspace</b><span>Bike, auto and cab operating flow · passenger rides remain separate from delivery work</span></span><span class="summary"><span class="badge">Screens 116–123</span><span class="badge green">8 routes · 8 capabilities</span><span class="badge">Ready for review</span></span></header><main class="layout"><section class="catalog"><h2>Complete Captain journey</h2><div id="catalog"></div></section><section class="preview"><div class="preview-bar"><span class="preview-copy"><b id="previewTitle">Screen 116 · Captain Home</b><span id="previewPurpose">Go online, see demand and act on priority work</span></span><a class="open" id="openScreen" href="screens/116-captain-home-availability.html">Open full screen</a></div><div class="frame-wrap"><iframe class="frame" id="previewFrame" title="Captain workspace preview" src="screens/116-captain-home-availability.html"></iframe></div></section></main><script>const screens=[[116,"Captain Home","Go online, see demand and act on priority work","screens/116-captain-home-availability.html"],[117,"Ride Request","Decide using exact route, payment and net earning","screens/117-captain-ride-request.html"],[118,"Pickup & Arrival","Navigate, contact rider and start with OTP","screens/118-captain-pickup-navigation.html"],[119,"Live Trip & Safety","Focused navigation, SOS and destination arrival","screens/119-captain-live-trip-safety.html"],[120,"Fare Completion","Finalize fare and confirm authoritative payment","screens/120-captain-fare-completion.html"],[121,"Earnings & Payouts","Trips, charges, incentives, cash and payouts","screens/121-captain-earnings-payouts.html"],[122,"Vehicle & Compliance","Eligibility, documents, expiry and vehicle updates","screens/122-captain-vehicle-compliance.html"],[123,"Support & Paid Work","Trip support, funded work and vehicle help","screens/123-captain-support-paid-work.html"]];const catalog=document.getElementById('catalog'),frame=document.getElementById('previewFrame'),title=document.getElementById('previewTitle'),purpose=document.getElementById('previewPurpose'),open=document.getElementById('openScreen');screens.forEach(([id,name,detail,url])=>{const button=document.createElement('button');button.className=`item${id===116?' active':''}`;button.innerHTML=`<span class="num">${id}</span><span class="copy"><b>${name}</b><span>${detail}</span></span><span class="state">Review</span>`;button.addEventListener('click',()=>{if(matchMedia('(max-width:850px)').matches){location.href=url;return}document.querySelectorAll('.item.active').forEach(x=>x.classList.remove('active'));button.classList.add('active');frame.src=url;title.textContent=`Screen ${id} · ${name}`;purpose.textContent=detail;open.href=url});catalog.appendChild(button)});</script></body></html>
