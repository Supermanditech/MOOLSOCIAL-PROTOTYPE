<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MoolSocial Retailer Workspace Review</title>
  <style>
    :root{--navy:#000080;--green:#138808;--saffron:#ff9933;--ink:#10133a;--muted:#68708a;--line:#d8dced;--bg:#f4f6fb;--white:#fff}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,sans-serif;letter-spacing:0}button,a{font:inherit}.top{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:center;border-bottom:1px solid var(--line);padding:15px 20px;background:rgba(255,255,255,.97)}.brand{display:grid;gap:3px}.brand b{color:var(--navy);font-size:22px}.brand span{color:var(--muted);font-size:12px}.summary{display:flex;gap:8px}.badge{border:1px solid var(--line);border-radius:6px;padding:7px 9px;background:var(--white);font-size:11px;font-weight:800}.badge.new{border-color:#b9ddb7;color:var(--green)}.workspace{display:grid;grid-template-columns:minmax(330px,410px) minmax(430px,1fr);min-height:calc(100vh - 75px)}.catalog{overflow:auto;border-right:1px solid var(--line);padding:14px}.group{margin-bottom:18px}.group h2{margin:0 0 8px;color:var(--navy);font-size:13px}.item{width:100%;display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:9px;align-items:center;border:1px solid var(--line);border-radius:7px;margin-bottom:6px;padding:8px;background:var(--white);color:var(--ink);text-align:left;cursor:pointer}.item:hover,.item.active{border-color:var(--navy);box-shadow:inset 3px 0 0 var(--saffron)}.num{width:34px;height:34px;display:grid;place-items:center;border-radius:7px;background:#eef0ff;color:var(--navy);font-weight:900}.copy{min-width:0;display:grid;gap:2px}.copy b,.copy span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.copy b{font-size:12px}.copy span{color:var(--muted);font-size:10px}.state{border-radius:999px;padding:4px 6px;background:#edf7ec;color:var(--green);font-size:9px;font-weight:900}.state.review{background:#fff1e1;color:#8b4c00}.preview{position:sticky;top:75px;height:calc(100vh - 75px);display:grid;grid-template-rows:auto minmax(0,1fr);padding:14px}.preview-bar{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-bottom:0;border-radius:8px 8px 0 0;padding:8px 10px;background:var(--white)}.preview-copy{min-width:0;display:grid;gap:2px}.preview-copy b{color:var(--navy);font-size:13px}.preview-copy span{color:var(--muted);font-size:10px}.open{border:0;border-radius:6px;padding:8px 10px;background:var(--navy);color:var(--white);font-size:10px;font-weight:900;text-decoration:none}.frame-wrap{min-height:0;display:grid;place-items:center;overflow:auto;border:1px solid var(--line);border-radius:0 0 8px 8px;background:#e9ecf5}.frame{width:410px;height:calc(100vh - 125px);border:0;background:var(--white);box-shadow:0 10px 32px rgba(0,0,80,.17)}
    @media(max-width:850px){.top{position:static;grid-template-columns:1fr;padding:12px}.workspace{display:block}.catalog{border:0;padding:10px}.preview{display:none}.item{min-height:58px}.summary{flex-wrap:wrap}.brand b{font-size:19px}}
  </style>
</head>
<body>
  <header class="top"><span class="brand"><b>MoolSocial Retailer Workspace</b><span>Approved sequence · consumer access remains available through Mool</span></span><span class="summary"><span class="badge">Screens 74-106</span><span class="badge">33 approved</span><span class="badge new">Production route contracts locked</span></span></header>
  <main class="workspace">
    <section class="catalog" id="catalog" aria-label="Retailer workspace screens"></section>
    <section class="preview"><div class="preview-bar"><span class="preview-copy"><b id="previewTitle">Screen 74 · Retailer Home</b><span id="previewPurpose">Hybrid B2B and B2C operating home</span></span><a class="open" id="openScreen" href="screens/74-retail-products-stock-setup.html?view=home">Open full screen</a></div><div class="frame-wrap"><iframe class="frame" id="previewFrame" title="Retailer screen preview" src="screens/74-retail-products-stock-setup.html?view=home"></iframe></div></section>
  </main>
  <script>
    const groups=[
      ["Workspace entry & setup",[[74,"Retailer Home","Hybrid B2B and B2C operating home","screens/74-retail-products-stock-setup.html?view=home"],[75,"Order Review & Fulfilment","Accept, bill or release a customer order","screens/75-retailer-order-review-fulfilment.html"],[76,"Delivery Assignment","Assign delivery and record handover","screens/76-retailer-delivery-assignment-handover.html"],[77,"Delivery Completion","Track delivery through customer completion","screens/77-retailer-delivery-tracking-completion.html"],[78,"Create Order","Create phone, counter or assisted orders","screens/78-retailer-create-order.html"],[79,"Counter Management","Create and operate multiple named counters","screens/79-retailer-counter-management.html"],[80,"Counter Sale & Invoice","Fast POS sale and customer invoice","screens/80-retailer-counter-sale-invoice.html"]]],
      ["Wholesale procurement",[[81,"Wholesale Catalogue","Dense area-matched B2B product decision grid","screens/81-retailer-wholesale-buy-catalog.html"],[82,"Purchase Order Review","Review supplier lines, terms and totals","screens/82-retailer-wholesale-cart-purchase-order.html"],[83,"Wholesale Order Confirmed","Purchase order and payment protection truth","screens/83-retailer-wholesale-order-confirmed.html"],[84,"Wholesale Delivery Tracking","Live supplier and transport progress","screens/84-retailer-wholesale-delivery-tracking.html"],[85,"Goods Receipt","Verify quantity and condition before acceptance","screens/85-retailer-wholesale-goods-receipt.html"],[86,"Receipt Result","Stock and payment result after goods receipt","screens/86-retailer-wholesale-receipt-result.html"]]],
      ["Books & business services",[[87,"Purchase Book","Bills, invoice extraction, payables and GST","screens/87-retailer-purchase-book.html"],[88,"Supplier Bill Payment","Verify and authorize supplier payment","screens/88-retailer-supplier-bill-payment.html"],[89,"Supplier Payment Status","Authoritative payment and reversal state","screens/89-retailer-supplier-payment-status.html"],[90,"Sales Book","Unified app, counter, phone and chat sales","screens/90-retailer-sales-book.html"],[91,"Stock Statement","Sellable stock, reservations and movement","screens/91-retailer-stock-statement.html"],[92,"Business Book","Business position and reconciliation home","screens/92-retailer-business-book-home.html"],[93,"Business Services","Always-visible professional service catalogue","screens/93-retailer-business-services.html"],[94,"Service Plan","Compare service charges and controls","screens/94-retailer-business-service-plan.html?service=delivery"],[95,"Service Activation","Review mandate and activate service","screens/95-retailer-business-service-activation.html?service=delivery&plan=starter&limit=3000"],[96,"Active Service","Operate an activated business service","screens/96-retailer-business-service-active.html?service=delivery&plan=starter&limit=3000&payment=upi"]]],
      ["Customers, growth & controls",[[97,"Customers & Loyalty","Permission-aware customer records and retention","screens/97-retailer-customers-loyalty.html"],[98,"Customer Detail","Purchase history and repeat basket","screens/98-retailer-customer-detail-retention.html"],[99,"Offers & Campaigns","Live offers and performance control","screens/99-retailer-offers-campaigns.html"],[100,"Campaign Builder","Progressive audience, offer and budget setup","screens/100-retailer-offer-campaign-builder.html"],[101,"Slow Stock Liquidation","Recover cash with controlled routes","screens/101-retailer-slow-stock-liquidation.html"],[102,"AI Assistant","Approval-gated operating suggestions","screens/102-retailer-ai-operating-assistant.html"],[103,"Staff & Permissions","Team roles and shop access","screens/103-retailer-staff-permissions.html"],[104,"Store Settings","Shop readiness and fulfilment controls","screens/104-retailer-store-settings-readiness.html"],[105,"Returns & Issues","Evidence-led customer case resolution","screens/105-retailer-returns-customer-issues.html"],[106,"Cash & Reconciliation","Expenses, bank, cash and day close","screens/106-retailer-cash-bank-expenses-reconciliation.html"]]]
    ];
    const catalog=document.getElementById("catalog"),frame=document.getElementById("previewFrame"),title=document.getElementById("previewTitle"),purpose=document.getElementById("previewPurpose"),open=document.getElementById("openScreen");
    groups.forEach(([groupName,items])=>{const group=document.createElement("section");group.className="group";group.innerHTML=`<h2>${groupName}</h2>`;items.forEach(([id,name,detail,url])=>{const button=document.createElement("button");button.className=`item${id===74?" active":""}`;button.type="button";button.innerHTML=`<span class="num">${id}</span><span class="copy"><b>${name}</b><span>${detail}</span></span><span class="state">Approved</span>`;button.addEventListener("click",()=>{if(matchMedia("(max-width:850px)").matches){location.href=url;return}document.querySelectorAll(".item.active").forEach(item=>item.classList.remove("active"));button.classList.add("active");frame.src=url;title.textContent=`Screen ${id} · ${name}`;purpose.textContent=detail;open.href=url;});button.addEventListener("dblclick",()=>location.href=url);group.appendChild(button)});catalog.appendChild(group)});
  </script>
</body>
</html>
